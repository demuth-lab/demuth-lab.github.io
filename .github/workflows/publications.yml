name: Build Publications

permissions:
  contents: write
  
on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml bibtexparser

      - name: Run publication script
        run: python scripts/bib2yaml.py

      - name: Commit generated YAML
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com
          git add _data/publications.yml
          git commit -m "Auto-update publications" || echo "No changes"
          git push
