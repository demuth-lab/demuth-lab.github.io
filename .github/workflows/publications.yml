name: Build Publications

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 9 * * 1"   # Runs Mondays at 9:00 UTC (adjust if desired)

jobs:
  build-publications:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Needed for rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Run publication script
        run: python scripts/bib2yaml.py

      - name: Commit generated YAML (if changed)
        run: |
          set -e

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git checkout main
          git fetch origin main
          git pull --rebase origin main

          git add _data/publications.yml

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "Auto-update publications"
          git push origin main
