<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">
      <span>Demuth&nbsp;</span>
      <span class="brand-accent">Lab</span>
    </a>

    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/research/' | relative_url }}" class="{% if page.url contains '/research' %}active{% endif %}">Research</a>

      <a href="{{ '/people/' | relative_url }}" class="{% if page.url contains '/people' %}active{% endif %}">People</a>

      <a href="{{ '/publications/' | relative_url }}" class="{% if page.url contains '/publications' %}active{% endif %}">Publications</a>

      <a href="{{ '/join/' | relative_url }}" class="{% if page.url contains '/join' %}active{% endif %}">Join the Lab</a>

      <a href="{{ '/news/' | relative_url }}" class="{% if page.url contains '/news' %}active{% endif %}">News</a>

      <a href="{{ '/resources/' | relative_url }}" class="{% if page.url contains '/resources' %}active{% endif %}">Resources</a>

      <a href="{{ '/contact/' | relative_url }}" class="{% if page.url contains '/contact' %}active{% endif %}">Contact</a>
    </nav>
    
  </div>
</header>
<script>
  (function(){
    const btn = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.site-nav');
    if(!btn || !nav) return;
    btn.addEventListener('click', () => {
      const open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>
