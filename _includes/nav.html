<header class="site-header">
  <div class="container header-inner">
    <a class="brand" href="{{ '/' | relative_url }}">{{ site.title }}</a>

    <button class="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>

    <nav class="site-nav" aria-label="Primary">
      <a href="{{ '/research/' | relative_url }}">Research</a>
      <a href="{{ '/people/' | relative_url }}">People</a>
      <a href="{{ '/publications/' | relative_url }}">Publications</a>
      <a class="cta" href="{{ '/join/' | relative_url }}">Join the Lab</a>
      <a href="{{ '/news/' | relative_url }}">News</a>
      <a href="{{ '/resources/' | relative_url }}">Resources</a>
      <a href="{{ '/contact/' | relative_url }}">Contact</a>
    </nav>
  </div>
</header>
<script>
  (function(){
    const btn = document.querySelector('.nav-toggle');
    const nav = document.querySelector('.site-nav');
    if(!btn || !nav) return;
    btn.addEventListener('click', () => {
      const open = nav.classList.toggle('open');
      btn.setAttribute('aria-expanded', open ? 'true' : 'false');
    });
  })();
</script>
