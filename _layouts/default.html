<!doctype html>
<html lang="en">
<head>
  {% include head.html %}
</head>
<body class="{{ page.body-class }}">
  {% include nav.html %}
  <main class="site-main">
    <div class="container">
      {% if page.title and page.show_title != false %}
        <h1 class="page-title">{{ page.title }}</h1>
      {% endif %}
      {{ content }}
    </div>
  </main>
  {% include footer.html %}

#Script to listen for click off nav toggle on mobile
<script>
document.addEventListener("DOMContentLoaded", function () {
  const header = document.querySelector(".site-header");
  const hero = document.querySelector(".hero-banner");
  if (!header || !hero) return;

  function updateHeaderState() {
    const trigger = hero.offsetHeight - header.offsetHeight - 20;
    if (window.scrollY > trigger) {
      header.classList.add("scrolled");
    } else {
      header.classList.remove("scrolled");
    }
  }

  updateHeaderState();
  window.addEventListener("scroll", updateHeaderState);
  window.addEventListener("resize", updateHeaderState);
});
</script>
  <script>
document.addEventListener("click", function(e){

  const nav = document.querySelector(".site-nav");
  const toggle = document.querySelector(".nav-toggle");

  if(!nav || !toggle) return;

  const navOpen = nav.classList.contains("open");

  if(navOpen && !nav.contains(e.target) && !toggle.contains(e.target)){
    toggle.click();
  }

});
</script>
  
</body>
</html>
